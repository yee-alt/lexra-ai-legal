<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德语3000高频词汇 · Deutsch 3000</title>
<meta name="description" content="德语3000高频词汇学习 — 动词变位、名词性别、例句造句，搜索与分类浏览">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0d0d0d; --white:#f5f5f0; --gray-1:#1a1a1a; --gray-2:#2e2e2e;
  --gray-3:#5a5a5a; --gray-4:#8a8a8a; --gray-5:#c8c8c0; --gray-6:#e8e8e0;
  --red:#e63020; --red-dark:#b52418; --red-pale:#fdf0ee;
  --blue:#1a3a8f; --blue-mid:#2850c8; --blue-pale:#eef2fc;
  --yellow:#f5c800; --yellow-pale:#fffbea;
  --green:#1a6b3c; --green-mid:#2a9050; --green-pale:#eef7f2;
  --orange:#e07820; --orange-pale:#fef4e8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);font-family:'Noto Sans SC',sans-serif;color:var(--white);min-height:100vh;position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--gray-1);} ::-webkit-scrollbar-thumb{background:var(--gray-2);}

/* NAV */
nav{position:sticky;top:0;background:rgba(13,13,13,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);z-index:100;padding:0 20px;}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:var(--white);text-decoration:none;}
.nav-logo em{color:var(--yellow);font-style:normal;}
.nav-back{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s;}
.nav-back:hover{color:var(--white);}

/* HERO */
.hero{max-width:1200px;margin:0 auto;padding:52px 20px 40px;position:relative;z-index:1;}
.hero-overline{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:5px;color:var(--yellow);text-transform:uppercase;display:block;margin-bottom:16px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,9vw,88px);letter-spacing:3px;line-height:.95;color:var(--white);margin-bottom:16px;}
.hero-title em{color:var(--red);font-style:normal;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.5px;line-height:1.7;max-width:560px;margin-bottom:32px;}
.hero-stats{display:flex;flex-wrap:wrap;gap:0;border:1px solid rgba(255,255,255,.08);overflow:hidden;width:fit-content;}
.hstat{padding:14px 24px;border-right:1px solid rgba(255,255,255,.08);text-align:center;}
.hstat:last-child{border-right:none;}
.hstat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;display:block;line-height:1;}
.hstat-l{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:2px;color:rgba(255,255,255,.3);margin-top:3px;display:block;}
.n-red{color:var(--red);} .n-blue{color:var(--blue-mid);} .n-yellow{color:var(--yellow);} .n-green{color:var(--green-mid);}

/* CONTROLS */
.controls{max-width:1200px;margin:0 auto;padding:0 20px 28px;position:relative;z-index:1;}
.controls-inner{display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap input{width:100%;background:var(--gray-1);border:1px solid rgba(255,255,255,.1);color:var(--white);font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:12px 16px 12px 40px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:rgba(255,255,255,.25);}
.search-wrap input::placeholder{color:var(--gray-3);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-3);font-size:13px;}
.tab-group{display:flex;gap:0;border:1px solid rgba(255,255,255,.1);overflow:hidden;}
.tab-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:12px 20px;background:transparent;color:rgba(255,255,255,.35);border:none;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{color:var(--white);background:rgba(255,255,255,.06);}
.tab-btn.active{background:var(--white);color:var(--black);}
.tab-btn.active.t-verb{background:var(--red);color:white;}
.tab-btn.active.t-noun{background:var(--blue);color:white;}
.tab-btn.active.t-adj{background:var(--green);color:white;}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;padding:8px 12px;background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.35);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.filter-chip:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7);}
.filter-chip.on{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.3);color:var(--white);}
.sort-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;padding:12px 14px;background:transparent;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);cursor:pointer;text-transform:uppercase;transition:all .2s;}
.sort-btn:hover{color:var(--white);}
.result-count{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.25);white-space:nowrap;}
.loading-note{width:100%;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.35);}

/* GRID */
.vocab-grid{max-width:1200px;margin:0 auto;padding:0 20px 60px;position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}

/* VERB CARD */
.vcard{background:var(--white);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .2s,box-shadow .2s;}
.vcard:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.6);}
.vcard-bar{height:4px;width:100%;}
.bar-verb{background:var(--red);}
.bar-noun-der{background:var(--blue);}
.bar-noun-die{background:var(--red);}
.bar-noun-das{background:var(--green);}
.bar-adj{background:var(--green);}
.bar-adv{background:var(--orange);}
.bar-konj{background:var(--yellow);}
.bar-prep{background:var(--blue-mid);}
.vcard-body{padding:20px 22px 22px;}
.vcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.vcard-word{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;color:var(--black);}
.vcard-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray-3);letter-spacing:2px;margin-top:4px;}
.vcard-right{text-align:right;}
.vcard-emoji{font-size:28px;line-height:1;display:block;margin-bottom:4px;}
.type-chip{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;color:white;display:inline-block;}
.chip-red{background:var(--red);}
.chip-blue{background:var(--blue);}
.chip-green{background:var(--green);}
.chip-orange{background:var(--orange);}
.chip-yellow{background:var(--yellow);color:var(--black);}
.chip-gray{background:var(--gray-2);}
.vcard-zh{font-size:15px;font-weight:700;color:var(--black);margin-bottom:10px;}

/* NOUN GENDER BADGE */
.gender-badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;}
.gender-art{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;padding:3px 10px;color:white;}
.art-der{background:var(--blue);}
.art-die{background:var(--red);}
.art-das{background:var(--green);}
.gender-pl{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray-3);letter-spacing:1px;}

/* CONJUGATION TABLE */
.conj-section{margin-top:12px;border-top:1px solid rgba(0,0,0,.07);padding-top:12px;}
.conj-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gray-3);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.conj-label::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.07);}
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:10px;}
.conj-cell{display:flex;justify-content:space-between;padding:4px 8px;background:rgba(0,0,0,.03);}
.conj-pro{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray-3);}
.conj-form{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--black);letter-spacing:.5px;}
.conj-row2{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.conj-mini{background:rgba(0,0,0,.05);padding:4px 10px;font-size:11px;}
.conj-mini span:first-child{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray-3);letter-spacing:1px;margin-right:6px;}
.conj-mini span:last-child{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--black);}
.aux-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;background:rgba(0,0,0,.08);color:var(--gray-2);letter-spacing:1px;}

/* EXAMPLE SENTENCE */
.ex-section{margin-top:10px;padding:10px 12px;border-left:3px solid;}
.ex-de{font-size:12px;font-weight:600;color:var(--black);line-height:1.5;margin-bottom:3px;}
.ex-zh{font-size:11px;color:var(--gray-3);line-height:1.5;}
.ex-verb{border-color:var(--red);background:var(--red-pale);}
.ex-noun{border-color:var(--blue);background:var(--blue-pale);}
.ex-adj{border-color:var(--green);background:var(--green-pale);}
.ex-adv{border-color:var(--orange);background:var(--orange-pale);}
.ex-prep{border-color:var(--blue-mid);background:rgba(40,80,200,.06);}
.ex-konj{border-color:var(--yellow);background:var(--yellow-pale);}

/* PAGINATION */
.pagination{max-width:1200px;margin:0 auto;padding:0 20px 60px;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1;flex-wrap:wrap;}
.page-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:10px 16px;background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;}
.page-btn:hover{border-color:rgba(255,255,255,.3);color:var(--white);}
.page-btn.active{background:var(--white);color:var(--black);border-color:var(--white);}
.page-btn:disabled{opacity:.2;cursor:default;}
.page-info{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.25);letter-spacing:2px;}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;}
.empty-icon{font-size:48px;margin-bottom:16px;display:block;}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:rgba(255,255,255,.15);margin-bottom:8px;}
.empty-sub{font-size:12px;color:rgba(255,255,255,.2);}

/* RESPONSIVE */
@media(max-width:640px){
  .hero{padding:40px 16px 28px;}
  .controls{padding:0 16px 20px;}
  .vocab-grid{padding:0 16px 40px;grid-template-columns:1fr;}
  .controls-inner{gap:8px;}
  .search-wrap{min-width:100%;}
  .filter-group{width:100%;}
  .sort-btn{padding:10px 12px;}
  .result-count{width:100%;}
  .vcard-body{padding:16px;}
  .vcard-word{font-size:30px;}
  .conj-grid{grid-template-columns:1fr;}
  .tab-btn{padding:10px 14px;font-size:12px;}
  .hstat{padding:12px 16px;}
  .hero-stats{width:100%;}
}
@media(max-width:480px){
  .tab-group{width:100%;}
  .tab-btn{flex:1;padding:10px 8px;font-size:11px;}
}
@media (min-width: 641px) and (max-width: 1024px){
  .hero,.controls,.vocab-grid,.pagination{max-width:980px;}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
}
@media (min-width: 1440px){
  .hero,.controls,.vocab-grid,.pagination{max-width:1320px;}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}
}

<!-- HERO -->
<div class="hero">

  <p class="hero-sub">高频动词含变位与造句 · 名词含性别与复数 · 形容词副词介词完整收录 · 搜索、分类、每词必有例句</p>
  <div class="hero-stats" id="heroStats">

    <div class="hstat"><span class="hstat-n n-green" id="countAdj">—</span><span class="hstat-l">ADJEKTIVE</span></div>

<!-- CONTROLS -->
<div class="controls">
  <div class="controls-inner">

      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索德语词汇或中文含义...">
    </div>
    <div class="tab-group">
      <button class="tab-btn active" data-tab="all" onclick="setTab('all',this)">ALLE</button>
      <button class="tab-btn t-verb" data-tab="verb" onclick="setTab('verb',this)">VERBEN</button>
      <button class="tab-btn t-noun" data-tab="noun" onclick="setTab('noun',this)">NOMEN</button>
      <button class="tab-btn t-adj" data-tab="adj" onclick="setTab('adj',this)">ADJ/ADV</button>
    </div>
    <div class="filter-group" id="filterGroup"></div>
    <button class="sort-btn" onclick="toggleSort()">⇅ <span id="sortLabel">A–Z</span></button>
    <span class="result-count" id="resultCount"></span>
    <span class="loading-note" id="loadingNote">词库初始化中...</span>
  </div>
</div>

<!-- GRID -->
<div class="vocab-grid" id="vocabGrid"></div>

<!-- PAGINATION -->
<div class="pagination" id="pagination"></div>

<script>
// ── ASYNC DATA LOADER ───────────────────────────────────
const DATASETS = {
  verbs: [
    { key:'VERBS_1', src:'data/verbs_1.js' },
    { key:'VERBS_2', src:'data/verbs_2.js' },
    { key:'VERBS_3', src:'data/verbs_3.js' },
    { key:'VERBS_4', src:'data/verbs_4.js' }
  ],
  nouns: [
    { key:'NOUNS', src:'data/nouns.js' },
    { key:'NOUNS_2', src:'data/nouns_2.js' }
  ],
  adj: [
    { key:'ADJ', src:'data/adjectives.js' }
  ]
};

const loadedScripts = new Set();
const loadedGroups = new Set();

function loadScript(src) {
  if (loadedScripts.has(src)) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => { loadedScripts.add(src); resolve(); };
    s.onerror = () => reject(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}

async function loadGroup(group) {
  if (loadedGroups.has(group)) return;
  const list = DATASETS[group] || [];
  for (const item of list) {
    if (!window[item.key]) await loadScript(item.src);
  }
  loadedGroups.add(group);
}

let allVerbs = [];
let allNouns = [];
let allAdj = [];
let DATA = [];

function rebuildData() {
  allVerbs = [
    ...(window.VERBS_1 || []),
    ...(window.VERBS_2 || []),
    ...(window.VERBS_3 || []),
    ...(window.VERBS_4 || [])
  ];
  allNouns = [
    ...(window.NOUNS || []),
    ...(window.NOUNS_2 || [])
  ];
  allAdj = window.ADJ || [];

// Normalize to unified schema
  DATA = [
  ...allVerbs.map((v, i) => ({
    id: 'v'+i, cat:'verb', de:v.de, zh:v.zh,
    verbType:v.t, conj:v.c, prat:v.pr, p2:v.p2, aux:v.a,
    exDe:v.sd, exZh:v.sz
  })),
  ...allNouns.map((n, i) => ({
    id: 'n'+i, cat:'noun', de:n.de, zh:n.zh,
    art:n.art, pl:n.pl, emoji:n.em,
    exDe:n.sd, exZh:n.sz
  })),
  ...allAdj.map((a, i) => ({
    id: 'a'+i, cat: a.cat==='adj'?'adj': a.cat==='adv'?'adv': a.cat==='konj'?'konj': a.cat==='prep'?'prep':'adj',
    de:a.de, zh:a.zh, exDe:a.sd, exZh:a.sz
  }))
];
}

// ── STATE ───────────────────────────────────────────────
let activeTab = 'all';
let activeFilter = '';
let searchQ = '';
let sortAZ = true;
let currentPage = 1;
const PER_PAGE = window.matchMedia('(max-width: 640px)').matches ? 12 : 24;

function updateStats() {
  document.getElementById('countVerb').textContent  = allVerbs.length;
  document.getElementById('countNoun').textContent  = allNouns.length;
  document.getElementById('countAdj').textContent   = allAdj.length;
  document.getElementById('countTotal').textContent = DATA.length;
}

// ── FILTER CHIPS CONFIG ──────────────────────────────────
const VERB_TYPES = {
  t:'transitiv', i:'intransitiv', r:'reflexiv', m:'modal', sep:'trennbar', ins:'untrennbar'
};
const NOUN_ARTS = ['der','die','das'];

function buildFilterGroup() {
  const fg = document.getElementById('filterGroup');
  fg.innerHTML = '';
  let chips = [];
  if (activeTab === 'verb') {
    chips = Object.entries(VERB_TYPES).map(([k,v]) => ({val:k, label:v}));
  } else if (activeTab === 'noun') {
    chips = NOUN_ARTS.map(a => ({val:a, label:a}));
  } else if (activeTab === 'adj') {
    chips = [
      {val:'adj',label:'Adjektiv'},{val:'adv',label:'Adverb'},
      {val:'konj',label:'Konjunktion'},{val:'prep',label:'Präposition'}
    ];
  }
  chips.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (activeFilter===c.val?' on':'');
    btn.textContent = c.label;
    btn.onclick = () => { activeFilter = activeFilter===c.val?'':c.val; currentPage=1; buildFilterGroup(); render(); };
    fg.appendChild(btn);
  });
}

// ── FILTER DATA ───────────────────────────────────────────
function getFiltered() {
  let d = DATA;
  if (activeTab !== 'all') {
    if (activeTab === 'adj') d = d.filter(x => ['adj','adv','konj','prep'].includes(x.cat));
    else d = d.filter(x => x.cat === activeTab);
  }
  if (activeFilter) {
    if (activeTab === 'verb') d = d.filter(x => x.verbType === activeFilter);
    else if (activeTab === 'noun') d = d.filter(x => x.art === activeFilter);
    else if (activeTab === 'adj') d = d.filter(x => x.cat === activeFilter);
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    d = d.filter(x => x.de.toLowerCase().includes(q) || x.zh.includes(searchQ));
  }
  if (sortAZ) d = [...d].sort((a,b) => a.de.localeCompare(b.de,'de'));
  return d;
}

// ── CARD BUILDERS ─────────────────────────────────────────
const PRONOUN_LABELS = ['ich','du','er/sie','wir','ihr','sie'];

function buildVerbCard(w, idx) {
  const typeLabel = VERB_TYPES[w.verbType] || w.verbType || '';
  const chipCls = w.verbType==='m'?'chip-yellow': w.verbType==='r'?'chip-orange':'chip-red';
  const conjRows = (w.conj||[]).map((f,i)=>`
    <div class="conj-cell">
      <span class="conj-pro">${PRONOUN_LABELS[i]||''}</span>
      <span class="conj-form">${f}</span>
    </div>`).join('');
  const auxText = w.aux==='s'? '+ sein': '+ haben';
  return `
  <div class="vcard">
    <div class="vcard-bar bar-verb"></div>
    <div class="vcard-body">
      <div class="vcard-top">
        <div>
          <div class="vcard-num">${String(idx+1).padStart(3,'0')} · VERB</div>
          <div class="vcard-word">${w.de}</div>
        </div>
        <div class="vcard-right">
          <span class="type-chip ${chipCls}">${typeLabel}</span>
        </div>
      </div>
      <div class="vcard-zh">${w.zh}</div>
      ${w.conj && w.conj.length ? `
      <div class="conj-section">
        <div class="conj-label">PRÄSENS</div>
        <div class="conj-grid">${conjRows}</div>
        <div class="conj-row2">
          <div class="conj-mini"><span>PRÄT.</span><span>${w.prat||'—'}</span></div>
          <div class="conj-mini"><span>PARTIZIP II</span><span>${w.p2||'—'}</span></div>
          <div class="conj-mini"><span>PERFEKT</span><span>${auxText}</span></div>
        </div>
      </div>` : ''}
      <div class="ex-section ex-verb">
        <div class="ex-de">${w.exDe||''}</div>
        <div class="ex-zh">${w.exZh||''}</div>
      </div>
    </div>
  </div>`;
}

function buildNounCard(w, idx) {
  const artClass = w.art==='der'?'art-der': w.art==='die'?'art-die':'art-das';
  const barClass = w.art==='der'?'bar-noun-der': w.art==='die'?'bar-noun-die':'bar-noun-das';
  const chipColor = w.art==='der'?'chip-blue': w.art==='die'?'chip-red':'chip-green';
  return `
  <div class="vcard">
    <div class="vcard-bar ${barClass}"></div>
    <div class="vcard-body">
      <div class="vcard-top">
        <div>
          <div class="vcard-num">${String(idx+1).padStart(3,'0')} · NOMEN</div>
          <div class="vcard-word">${w.de}</div>
        </div>
        <div class="vcard-right">
          ${w.emoji?`<span class="vcard-emoji">${w.emoji}</span>`:''}
          <span class="type-chip ${chipColor}">${w.art||''}</span>
        </div>
      </div>
      <div class="gender-badge">
        <span class="gender-art ${artClass}">${w.art} ${w.de}</span>
        <span class="gender-pl">Pl: ${w.pl||'—'}</span>
      </div>
      <div class="vcard-zh">${w.zh}</div>
      <div class="ex-section ex-noun">
        <div class="ex-de">${w.exDe||''}</div>
        <div class="ex-zh">${w.exZh||''}</div>
      </div>
    </div>
  </div>`;
}

function buildAdjCard(w, idx) {
  const labels = {adj:'Adjektiv',adv:'Adverb',konj:'Konjunktion',prep:'Präposition'};
  const bars   = {adj:'bar-adj',adv:'bar-adv',konj:'bar-konj',prep:'bar-prep'};
  const exCls  = {adj:'ex-adj',adv:'ex-adv',konj:'ex-konj',prep:'ex-prep'};
  const chips  = {adj:'chip-green',adv:'chip-orange',konj:'chip-yellow',prep:'chip-blue'};
  const cat = w.cat||'adj';
  return `
  <div class="vcard">
    <div class="vcard-bar ${bars[cat]||'bar-adj'}"></div>
    <div class="vcard-body">
      <div class="vcard-top">
        <div>
          <div class="vcard-num">${String(idx+1).padStart(3,'0')} · ${(labels[cat]||'ADJ').toUpperCase()}</div>
          <div class="vcard-word">${w.de}</div>
        </div>
        <div class="vcard-right">
          <span class="type-chip ${chips[cat]||'chip-green'}">${labels[cat]||'Adjektiv'}</span>
        </div>
      </div>
      <div class="vcard-zh">${w.zh}</div>
      <div class="ex-section ${exCls[cat]||'ex-adj'}">
        <div class="ex-de">${w.exDe||''}</div>
        <div class="ex-zh">${w.exZh||''}</div>
      </div>
    </div>
  </div>`;
}

function buildCard(w, idx) {
  if (w.cat==='verb') return buildVerbCard(w, idx);
  if (w.cat==='noun') return buildNounCard(w, idx);
  return buildAdjCard(w, idx);
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PER_PAGE));
  if (currentPage > totalPages) currentPage = 1;

  document.getElementById('resultCount').textContent = total + ' 词';

  const grid = document.getElementById('vocabGrid');
  if (total === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-title">KEINE ERGEBNISSE</div><div class="empty-sub">没有找到符合条件的词汇，请尝试其他关键词</div></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const slice = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);
  grid.innerHTML = slice.map((w,i) => buildCard(w, (currentPage-1)*PER_PAGE+i)).join('');

  // Pagination
  const pg = document.getElementById('pagination');
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← PREV</button>`;
  const maxShow = 7;
  let start = Math.max(1, currentPage-3);
  let end   = Math.min(totalPages, start+maxShow-1);
  if (end-start < maxShow-1) start = Math.max(1, end-maxShow+1);
  if (start>1) html += `<button class="page-btn" onclick="goPage(1)">1</button><span class="page-info">…</span>`;
  for (let p=start; p<=end; p++) {
    html += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (end<totalPages) html += `<span class="page-info">…</span><button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>NEXT →</button>`;
  html += `<span class="page-info">${currentPage} / ${totalPages}</span>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const filtered = getFiltered();
  const totalPages = Math.max(1,Math.ceil(filtered.length/PER_PAGE));
  if (p<1||p>totalPages) return;
  currentPage = p;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setTab(tab, el) {
  activeTab = tab; activeFilter = ''; currentPage = 1;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  buildFilterGroup();
  ensureTabData().then(render);
}

function toggleSort() {
  sortAZ = !sortAZ;
  document.getElementById('sortLabel').textContent = sortAZ?'A–Z':'Z–A';
  currentPage=1; render();
}

// Search debounce
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = e.target.value.trim();
    currentPage = 1;
    render();
  }, 200);
});

// Init
async function ensureTabData() {
  const note = document.getElementById('loadingNote');
  const map = {
    all: ['verbs','nouns','adj'],
    verb: ['verbs'],
    noun: ['nouns'],
    adj: ['adj']
  };
  const needed = map[activeTab] || [];
  const toLoad = needed.filter(x => !loadedGroups.has(x));
  if (!toLoad.length) return;
  note.textContent = '正在加载词库...';
  note.style.display = 'block';
  await Promise.all(toLoad.map(loadGroup));
  rebuildData();
  updateStats();
  note.textContent = '';
  note.style.display = 'none';
}

async function init() {
  buildFilterGroup();
  const note = document.getElementById('loadingNote');
  note.textContent = '首屏先加载核心词库...';
  note.style.display = 'block';
  await loadGroup('verbs');
  rebuildData();
  updateStats();
  render();
  note.textContent = '后台继续加载名词/形容词...';
  await Promise.all([loadGroup('nouns'), loadGroup('adj')]);
  rebuildData();
  updateStats();
  render();
  note.textContent = '';
  note.style.display = 'none';
}

init();
</script>
</body>
</html>
